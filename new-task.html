<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>新增任務 — 歐萊德小管家</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Noto Sans TC", sans-serif;
      background: #F0F4F8; min-height: 100vh; padding: 20px 16px 48px;
    }
    .header {
      background: #1E3A5F; color: white;
      padding: 16px; border-radius: 12px; margin-bottom: 14px;
    }
    .header .label { font-size: 12px; opacity: 0.7; margin-bottom: 4px; }
    .header .title { font-size: 18px; font-weight: bold; }
    .card {
      background: white; border-radius: 12px;
      padding: 16px; margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .field-label {
      display: block; font-size: 13px; font-weight: bold;
      color: #1E3A5F; margin-bottom: 6px;
    }
    .required { color: #C62828; }
    input[type="text"], input[type="date"], textarea {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #DDD; border-radius: 8px;
      font-size: 15px; font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: #1E3A5F; }
    textarea { resize: vertical; }
    .error-msg { color: #C62828; font-size: 13px; margin-top: 4px; display: none; }

    /* 通知對象選擇器 */
    .picker-top {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .selected-badge {
      font-size: 13px; color: #1565C0; font-weight: bold;
      background: #E3F2FD; padding: 4px 12px; border-radius: 12px;
    }
    .search-box {
      width: 100%; padding: 9px 12px; margin-bottom: 10px;
      border: 1.5px solid #DDD; border-radius: 8px;
      font-size: 14px; font-family: inherit;
    }
    .search-box:focus { outline: none; border-color: #1E3A5F; }

    .dept-block { margin-bottom: 6px; border: 1.5px solid #E8EDF3; border-radius: 10px; overflow: hidden; }
    .dept-head {
      display: flex; align-items: center; padding: 11px 14px;
      background: #F8FAFC; cursor: pointer; user-select: none;
      gap: 10px;
    }
    .dept-head:hover { background: #EFF4F8; }
    .dept-head input[type="checkbox"] { width: 17px; height: 17px; flex-shrink: 0; cursor: pointer; }
    .dept-title { flex: 1; font-size: 14px; font-weight: bold; color: #1E3A5F; }
    .dept-stat  { font-size: 12px; color: #999; }
    .dept-arrow { font-size: 11px; color: #AAA; transition: transform 0.2s; }
    .dept-arrow.open { transform: rotate(180deg); }

    .dept-body { display: none; padding: 6px 14px 12px; }
    .dept-body.open { display: block; }

    .mbr-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid #F3F3F3; cursor: pointer;
    }
    .mbr-item:last-child { border-bottom: none; }
    .mbr-item input[type="checkbox"] { width: 17px; height: 17px; flex-shrink: 0; cursor: pointer; }
    .mbr-name { font-size: 14px; color: #333; flex: 1; }
    .mbr-tag {
      font-size: 11px; padding: 2px 7px; border-radius: 8px;
    }
    .tag-admin   { background: #FFF3E0; color: #E65100; }
    .tag-manager { background: #E3F2FD; color: #1565C0; }

    .no-mbr { font-size: 13px; color: #999; padding: 10px 0; text-align: center; }

    .btn-submit {
      width: 100%; padding: 14px; background: #1E3A5F;
      color: white; border: none; border-radius: 10px;
      font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px;
    }
    .btn-submit:disabled { background: #AAA; }

    #loading   { text-align: center; padding: 60px 20px; color: #999; }
    #no-perm   { display: none; text-align: center; padding: 60px 20px; color: #C62828; }
    #form-wrap { display: none; }
    #success   { display: none; text-align: center; padding: 48px 20px; }
    #success .icon { font-size: 52px; margin-bottom: 14px; }
    #success .msg  { font-size: 17px; font-weight: bold; color: #333; }
    #success .sub  { font-size: 14px; color: #888; margin-top: 8px; }

    /* 提醒設定 */
    .reminder-opts { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .reminder-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: #333; cursor: pointer;
    }
    .reminder-item input[type="checkbox"] { width: 17px; height: 17px; cursor: pointer; flex-shrink: 0; }

    /* 任務類型 */
    .type-btn {
      flex: 1; padding: 12px 10px; border: 2px solid #DDD;
      border-radius: 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s;
      display: block;
    }
    .type-btn.selected { border-color: #1E3A5F; background: #EBF1F8; }
    .type-btn input[type="radio"] { display: none; }
    .type-sub { font-size: 11px; color: #777; margin-top: 3px; font-weight: normal; }

    /* 附件 */
    .btn-add-file {
      width: 100%; padding: 12px; border: 1.5px dashed #AAA; border-radius: 8px;
      background: #FAFAFA; color: #555; font-size: 14px; font-weight: bold;
      cursor: pointer; text-align: center;
    }
    .btn-add-file:active { background: #F0F0F0; }
    .file-list { margin-top: 8px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #EFF4F8; border-radius: 6px;
      margin-bottom: 6px; font-size: 13px; color: #333;
      border: 1px solid #C8D9EA;
    }
    .file-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-del {
      background: none; border: none; color: #999; font-size: 18px;
      cursor: pointer; padding: 0 2px; flex-shrink: 0; line-height: 1;
    }
  </style>
</head>
<body>

<div id="loading">載入中…</div>
<div id="no-perm">
  <div style="font-size:44px">⛔</div>
  <div style="margin-top:12px;font-weight:bold">您沒有新增任務的權限</div>
</div>

<div id="form-wrap">
  <div class="header">
    <div class="label">歐萊德小管家 — 管理功能</div>
    <div class="title">➕ 新增任務</div>
  </div>

  <div style="text-align:center;margin-bottom:12px;">
    <a href="https://liff.line.me/2009974832-1tuzOcJQ/project"
       style="display:inline-block;padding:10px 20px;background:#fff;border:1.5px solid #1E3A5F;border-radius:10px;color:#1E3A5F;font-size:14px;font-weight:bold;text-decoration:none;">
      📁 切換為跨部門專案模式
    </a>
    <div style="font-size:11px;color:#999;margin-top:5px;">一張單自動分派任務給多個部門</div>
  </div>

  <!-- 群組快速建立提示（有 ?desc= 參數時顯示） -->
  <div id="prefill-hint" style="display:none;background:#FFF3E0;border:1.5px solid #FF8F00;border-radius:10px;padding:12px 14px;margin-bottom:12px;font-size:13px;color:#E65100;">
    📋 已從群組訊息自動填入，請確認並補充截止日期與回報資料後送出。
  </div>

  <div class="card">
    <label class="field-label">專案名稱 <span class="required">*</span></label>
    <input type="text" id="project-name" placeholder="例：Q2 物料盤點">
    <div class="error-msg" id="err-name">請填寫專案名稱</div>
  </div>

  <div class="card">
    <label class="field-label">任務說明 <span class="required">*</span></label>
    <textarea id="description" rows="3" placeholder="請描述任務內容與目的"></textarea>
    <div class="error-msg" id="err-desc">請填寫任務說明</div>
  </div>

  <div class="card">
    <label class="field-label">截止日期 <span class="required">*</span></label>
    <input type="date" id="due-date">
    <div class="error-msg" id="err-due">請選擇截止日期</div>
  </div>

  <div class="card">
    <label class="field-label">任務類型 <span class="required">*</span></label>
    <div style="display:flex;gap:10px;margin-top:6px;">
      <label class="type-btn selected" id="lbl-report">
        <input type="radio" name="taskType" value="report" id="type-report" checked>
        <strong>📋 需回報</strong>
        <div class="type-sub">完成後需填寫回報內容</div>
      </label>
      <label class="type-btn" id="lbl-notify">
        <input type="radio" name="taskType" value="notify" id="type-notify">
        <strong>🔔 僅通知</strong>
        <div class="type-sub">一次性提醒，不需回報</div>
      </label>
    </div>
    <div id="report-scope" style="margin-top:10px;padding:10px;background:#F8FAFC;border-radius:8px;font-size:12px;color:#555;display:block;">
      回報後自動通知：起單人 ／ 指定群組 ／ 跨部門主管（依下方設定）
    </div>
  </div>

  <div class="card" id="req-card">
    <label class="field-label">需要回報的資料 <span class="required">*</span></label>
    <input type="text" id="required-data" placeholder="例：庫存總數量（整數）">
    <div class="error-msg" id="err-req">請說明需要的資料</div>
  </div>

  <!-- 通知對象 -->
  <div class="card">
    <div class="picker-top">
      <label class="field-label" style="margin:0">
        通知對象 <span class="required">*</span>
        <span style="font-size:11px;font-weight:normal;color:#999">（可跨部門複選）</span>
      </label>
      <span class="selected-badge" id="sel-count">已選 0 人</span>
    </div>
    <input type="text" class="search-box" id="search" placeholder="🔍 搜尋姓名…" oninput="filterSearch()">
    <div id="dept-list"></div>
    <div class="error-msg" id="err-rcpt">請至少選擇一位通知對象</div>
  </div>

  <div class="card">
    <label class="field-label">群組公告通知 <span style="font-size:11px;font-weight:normal;color:#999;">（選填，任務建立/完成時推播給指定群組）</span></label>
    <div id="group-list"></div>
  </div>

  <div class="card" id="reminder-card">
    <label class="field-label">提醒設定 <span style="font-size:11px;font-weight:normal;color:#999;">（系統依截止日自動提醒負責人）</span></label>
    <div class="reminder-opts">
      <label class="reminder-item"><input type="checkbox" id="rem-7"> 截止前 7 天提醒</label>
      <label class="reminder-item"><input type="checkbox" id="rem-3" checked> 截止前 3 天提醒</label>
      <label class="reminder-item"><input type="checkbox" id="rem-1"> 截止前 1 天提醒</label>
      <label class="reminder-item"><input type="checkbox" id="rem-0" checked> 截止當天提醒</label>
    </div>
  </div>

  <div class="card">
    <label class="field-label">📎 附件（選填）<span style="font-size:11px;font-weight:normal;color:#999;"> 任務相關說明文件</span></label>
    <button type="button" class="btn-add-file" onclick="document.getElementById('taskAttachFile').click()">
      ＋ 新增附件（每次選一個，可重複點擊加入多個）
    </button>
    <input type="file" id="taskAttachFile" style="display:none"
      accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip">
    <div class="file-list" id="taskFileList"></div>
    <div id="taskFileSizeWarn" style="color:#C62828;font-size:12px;margin-top:4px;display:none">
      ⚠️ 檔案總大小超過 20 MB，請移除部分檔案
    </div>
  </div>

  <button class="btn-submit" id="btn-submit" onclick="submitTask()">建立任務並通知</button>
</div>

<div id="success">
  <div class="icon">✅</div>
  <div class="msg">任務已建立！</div>
  <div class="sub" id="succ-sub">系統已自動發送通知。</div>
</div>

<script>
  var GAS_URL    = "https://script.google.com/macros/s/AKfycbx6_x9UZIhKAidFXzuXzY7UVEb4-s0_NHXuQIb5hQKWA-1p9aaq7VXK77DizT1UCAXL/exec";
  var userId;
  var allMembers  = [];
  var grouped     = {};   // dept -> [member]
  var deptOrder   = [];
  var pendingFiles = [];  // 累積選取的附件

  // ── 初始化 ────────────────────────────────────────────────

  async function init() {
    try {
      await liff.init({ liffId: "2009974832-1tuzOcJQ" });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      userId = liff.getContext().userId;

      // 取成員清單
      var mRes, mData;
      try {
        mRes  = await fetch(GAS_URL + "?action=getMembersList");
        mData = await mRes.json();
      } catch (fetchErr) {
        throw new Error("無法連線伺服器，請確認網路後重試。\n（" + fetchErr.message + "）");
      }
      if (mData.error) throw new Error("伺服器錯誤：" + mData.error);

      allMembers = mData.members || [];
      if (allMembers.length === 0) {
        document.getElementById("loading").innerHTML =
          "<div style='color:#C62828;padding:20px;text-align:center'>⚠️ 成員名單尚無資料。<br><br>請先請所有同仁加入 Bot 好友，<br>或由管理員在「成員名單」工作表新增資料。</div>";
        return;
      }

      var d = new Date(); d.setDate(d.getDate() + 7);
      document.getElementById("due-date").value = d.toISOString().split("T")[0];

      buildPicker(allMembers);

      // Load groups（失敗不阻擋主流程）
      try {
        var gRes  = await fetch(GAS_URL + "?action=getGroups");
        var gData = await gRes.json();
        buildGroupPicker(gData.groups || []);
      } catch (gErr) {
        buildGroupPicker([]);
      }

      // 群組快速建立：讀取 URL 參數預填表單
      var qp             = new URLSearchParams(location.search);
      var prefillDesc    = qp.get("desc")    || "";
      var prefillGroupId = qp.get("groupId") || "";

      if (prefillDesc) {
        // 任務說明 → 填入完整訊息
        document.getElementById("description").value = prefillDesc;
        // 專案名稱 → 取第一行，去除常見前綴，截斷 25 字
        var firstLine = prefillDesc.split(/[\n\r]/)[0]
          .replace(/^[\s　]*[交辦指示派工請麻煩]+[：:，,\s]*/u, "")
          .trim()
          .substring(0, 25);
        if (firstLine) document.getElementById("project-name").value = firstLine;
        document.getElementById("prefill-hint").style.display = "block";
      }
      // 預選對應群組通知
      if (prefillGroupId) {
        var grpCb = document.querySelector('.grp-cb[data-gid="' + prefillGroupId + '"]');
        if (grpCb) grpCb.checked = true;
      }

      // 任務類型切換
      document.querySelectorAll('input[name="taskType"]').forEach(function(radio) {
        radio.addEventListener("change", function() {
          var isNotify = this.value === "notify";
          document.getElementById("lbl-report").classList.toggle("selected", !isNotify);
          document.getElementById("lbl-notify").classList.toggle("selected",  isNotify);
          document.getElementById("req-card").style.display      = isNotify ? "none" : "block";
          document.getElementById("reminder-card").style.display = isNotify ? "none" : "block";
          document.getElementById("report-scope").style.display  = isNotify ? "none" : "block";
          document.getElementById("btn-submit").textContent = isNotify ? "建立提醒並通知" : "建立任務並通知";
        });
      });

      document.getElementById("taskAttachFile").addEventListener("change", function() {
        if (!this.files.length) return;
        pendingFiles.push(this.files[0]);
        this.value = "";
        renderTaskFileList();
      });

      show("form-wrap");
    } catch (err) {
      document.getElementById("loading").innerHTML =
        "<div style='color:#C62828;padding:20px;text-align:center'>"
        + "⚠️ 載入失敗<br><br>"
        + "<span style='font-size:13px;color:#555;'>" + esc(err.message) + "</span><br><br>"
        + "<span style='font-size:12px;color:#aaa;'>請關閉後重新開啟，或聯繫管理員</span>"
        + "</div>";
    }
  }

  // ── 建立部門 / 成員選擇器 ─────────────────────────────────

  function buildPicker(members) {
    grouped   = {};
    deptOrder = [];
    members.forEach(function(m) {
      var d = m.dept || "未分類";
      if (!grouped[d]) { grouped[d] = []; deptOrder.push(d); }
      grouped[d].push(m);
    });

    var container = document.getElementById("dept-list");
    container.innerHTML = "";
    deptOrder.forEach(function(dept) {
      container.appendChild(makeDeptBlock(dept, grouped[dept]));
    });
  }

  function makeDeptBlock(dept, members) {
    var dKey  = enc(dept);
    var block = el("div", "dept-block");
    block.id  = "blk-" + dKey;

    // ── 部門標頭 ──
    var head = el("div", "dept-head");
    head.innerHTML =
      '<input type="checkbox" id="dcb-' + dKey + '" onclick="event.stopPropagation();toggleDeptAll(' + q(dept) + ')">' +
      '<span class="dept-title">' + esc(dept) + '</span>' +
      '<span class="dept-stat" id="dst-' + dKey + '">0 / ' + members.length + '</span>' +
      '<span class="dept-arrow" id="darr-' + dKey + '">▼</span>';
    head.onclick = function() { toggleExpand(dept); };
    block.appendChild(head);

    // ── 成員列表 ──
    var body = el("div", "dept-body");
    body.id  = "dbody-" + dKey;

    if (members.length === 0) {
      body.innerHTML = '<div class="no-mbr">此部門尚無成員</div>';
    } else {
      members.forEach(function(m) {
        var row = el("label", "mbr-item");
        row.id  = "mrow-" + m.lineId;
        var tagHtml = "";
        if (m.role === "admin")   tagHtml = '<span class="mbr-tag tag-admin">管理員</span>';
        if (m.role === "manager") tagHtml = '<span class="mbr-tag tag-manager">主管</span>';
        row.innerHTML =
          '<input type="checkbox" id="mcb-' + m.lineId + '" ' +
            'data-dept="' + esc(m.dept || "未分類") + '" ' +
            'data-id="'   + m.lineId + '" ' +
            'data-name="' + esc(m.name) + '" ' +
            'onchange="updateStats()">' +
          '<span class="mbr-name">' + esc(m.name) + '</span>' + tagHtml;
        body.appendChild(row);
      });
    }
    block.appendChild(body);
    return block;
  }

  // ── 互動 ─────────────────────────────────────────────────

  function toggleExpand(dept) {
    var dKey  = enc(dept);
    var body  = document.getElementById("dbody-" + dKey);
    var arrow = document.getElementById("darr-"  + dKey);
    var open  = body.classList.contains("open");
    body.classList.toggle("open",  !open);
    arrow.classList.toggle("open", !open);
  }

  function toggleDeptAll(dept) {
    var dKey    = enc(dept);
    var cb      = document.getElementById("dcb-" + dKey);
    var checked = cb.checked;
    document.querySelectorAll('[data-dept="' + dept + '"]').forEach(function(m) {
      m.checked = checked;
    });
    if (checked) {
      document.getElementById("dbody-" + dKey).classList.add("open");
      document.getElementById("darr-"  + dKey).classList.add("open");
    }
    updateStats();
  }

  function updateStats() {
    var total = 0;
    deptOrder.forEach(function(dept) {
      var dKey    = enc(dept);
      var dMembers = grouped[dept] || [];
      var sel      = document.querySelectorAll('[data-dept="' + dept + '"]:checked').length;
      var statEl   = document.getElementById("dst-" + dKey);
      var cbEl     = document.getElementById("dcb-" + dKey);
      if (statEl) statEl.textContent = sel + " / " + dMembers.length;
      if (cbEl) {
        cbEl.checked       = sel > 0 && sel === dMembers.length;
        cbEl.indeterminate = sel > 0 && sel < dMembers.length;
      }
      total += sel;
    });
    document.getElementById("sel-count").textContent = "已選 " + total + " 人";
  }

  function filterSearch() {
    var q = document.getElementById("search").value.trim().toLowerCase();
    allMembers.forEach(function(m) {
      var rowEl = document.getElementById("mrow-" + m.lineId);
      if (rowEl) rowEl.style.display = (!q || m.name.toLowerCase().includes(q)) ? "" : "none";
    });
    deptOrder.forEach(function(dept) {
      var dKey   = enc(dept);
      var bodyEl = document.getElementById("dbody-" + dKey);
      var blkEl  = document.getElementById("blk-"   + dKey);
      if (!bodyEl || !blkEl) return;
      var visible = bodyEl.querySelectorAll('.mbr-item:not([style*="none"])').length;
      blkEl.style.display = visible > 0 ? "" : "none";
      if (q && visible > 0) {
        bodyEl.classList.add("open");
        document.getElementById("darr-" + dKey).classList.add("open");
      }
    });
  }

  // ── 提交 ─────────────────────────────────────────────────

  async function submitTask() {
    var btn = document.getElementById("btn-submit");
    if (btn.disabled) return;
    btn.disabled    = true;
    btn.textContent = "檢查中…";

    var taskType = document.getElementById("type-notify").checked ? "notify" : "report";
    var isNotify = taskType === "notify";

    var name    = document.getElementById("project-name").value.trim();
    var desc    = document.getElementById("description").value.trim();
    var due     = document.getElementById("due-date").value;
    var reqData = isNotify ? "（僅通知）" : document.getElementById("required-data").value.trim();

    var checked  = document.querySelectorAll(".mbr-item input:checked");
    var mgrIds   = [], mgrNames = [], depts = [];
    checked.forEach(function(cb) {
      mgrIds.push(cb.dataset.id);
      mgrNames.push(cb.dataset.name);
      var d = cb.dataset.dept;
      if (d && depts.indexOf(d) === -1) depts.push(d);
    });

    var valid = true;
    function chk(v, id) {
      document.getElementById(id).style.display = v ? "none" : "block";
      if (!v) valid = false;
    }
    chk(name,             "err-name");
    chk(desc,             "err-desc");
    chk(due,              "err-due");
    if (!isNotify) chk(reqData, "err-req");
    chk(mgrIds.length > 0,"err-rcpt");
    if (!valid) {
      btn.disabled    = false;
      btn.textContent = "建立任務並通知";
      return;
    }

    btn.textContent = "建立中…";

    // 收集提醒設定
    var reminderDays = [];
    if (document.getElementById("rem-7").checked) reminderDays.push(7);
    if (document.getElementById("rem-3").checked) reminderDays.push(3);
    if (document.getElementById("rem-1").checked) reminderDays.push(1);
    if (document.getElementById("rem-0").checked) reminderDays.push(0);
    var reminderSchedule = reminderDays.join(",") || "3,0";

    // 收集群組通知
    var groupIds = [];
    document.querySelectorAll(".grp-cb:checked").forEach(function(cb) {
      groupIds.push(cb.dataset.gid);
    });

    try {
      var taskId = "T-" + Date.now();
      var url = GAS_URL
        + "?action=createTask"
        + "&taskId="           + enc(taskId)
        + "&projectName="      + enc(name)
        + "&description="      + enc(desc)
        + "&dept="             + enc(depts.join(","))
        + "&managerName="      + enc(mgrNames.join(","))
        + "&managerLineId="    + enc(mgrIds.join(","))
        + "&requesterLineId="  + enc(userId)
        + "&dueDate="          + enc(due)
        + "&requiredData="     + enc(reqData)
        + "&notifyGroupIds="   + enc(groupIds.join(","))
        + "&taskType="         + enc(taskType)
        + "&reminderSchedule=" + enc(isNotify ? "" : reminderSchedule);

      var res    = await fetch(url);
      var result = await res.json();

      if (result.status === "ok") {
        hide("form-wrap");
        show("success");
        var succMsg = "已通知 " + mgrNames.join("、") + " 等 " + mgrIds.length + " 位人員。";
        document.getElementById("succ-sub").textContent = succMsg;

        if (pendingFiles.length > 0) {
          uploadTaskAttachments(pendingFiles.slice(), taskId);
        } else {
          setTimeout(function() { liff.closeWindow(); }, 3000);
        }
      } else {
        throw new Error(result.error || "建立失敗");
      }
    } catch (err) {
      btn.disabled    = false;
      btn.textContent = "建立任務並通知";
      alert("建立失敗：" + err.message);
    }
  }

  // ── 附件 ─────────────────────────────────────────────────────

  function renderTaskFileList() {
    var list    = document.getElementById("taskFileList");
    var warnEl  = document.getElementById("taskFileSizeWarn");
    list.innerHTML = "";
    var totalSize = pendingFiles.reduce(function(s, f) { return s + f.size; }, 0);
    pendingFiles.forEach(function(f, idx) {
      var item    = el("div", "file-item");
      var nameEl  = el("span", "file-item-name");
      nameEl.textContent = "📎 " + f.name + "（" + (f.size / 1024).toFixed(0) + " KB）";
      var delBtn  = el("button", "file-del");
      delBtn.type        = "button";
      delBtn.textContent = "×";
      delBtn.onclick     = function() { pendingFiles.splice(idx, 1); renderTaskFileList(); };
      item.appendChild(nameEl);
      item.appendChild(delBtn);
      list.appendChild(item);
    });
    warnEl.style.display = totalSize > 20 * 1024 * 1024 ? "block" : "none";
  }

  async function uploadTaskAttachments(files, taskId) {
    var succEl = document.getElementById("succ-sub");
    succEl.textContent += "\n⏳ 附件上傳中（0 / " + files.length + "）…";
    var ok = 0, fail = 0;
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      succEl.textContent = "⏳ 附件上傳中（" + (i + 1) + " / " + files.length + "）：" + f.name;
      try {
        var base64 = await new Promise(function(resolve, reject) {
          var reader = new FileReader();
          reader.onload  = function(e) { resolve(e.target.result.split(",")[1]); };
          reader.onerror = reject;
          reader.readAsDataURL(f);
        });
        var res  = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action:     "uploadFile",
            requestId:  taskId,
            userId:     userId,
            fileName:   f.name,
            mimeType:   f.type || "application/octet-stream",
            fileBase64: base64,
          }),
        });
        var data = await res.json();
        if (data.status === "ok") { ok++; } else { throw new Error(data.error || "失敗"); }
      } catch (e) { fail++; }
    }
    if (fail === 0) {
      succEl.textContent = "✅ " + ok + " 個附件已上傳並關聯至任務。";
    } else {
      succEl.textContent = "⚠️ " + ok + " 個成功，" + fail + " 個失敗。可稍後再試。";
    }
    setTimeout(function() { liff.closeWindow(); }, 3000);
  }

  // ── 群組選擇器 ───────────────────────────────────────────────

  function buildGroupPicker(groups) {
    var container = document.getElementById("group-list");
    if (!groups || groups.length === 0) {
      container.innerHTML = '<div style="font-size:13px;color:#999;">（尚無群組登記，請先將 Bot 加入群組）</div>';
      return;
    }
    groups.forEach(function(g) {
      var row = el("label");
      row.style.cssText = "display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;font-size:14px;color:#333;";
      row.innerHTML =
        '<input type="checkbox" class="grp-cb" data-gid="' + esc(g.lineId) + '" style="width:17px;height:17px;">👥 ' + esc(g.name || g.lineId);
      container.appendChild(row);
    });
  }

  // ── 工具 ─────────────────────────────────────────────────

  function el(tag, cls) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }
  function show(id) {
    document.getElementById("loading").style.display = "none";
    document.getElementById(id).style.display = "block";
  }
  function hide(id) { document.getElementById(id).style.display = "none"; }
  function enc(s)   { return encodeURIComponent(s); }
  function q(s)     { return JSON.stringify(s); }
  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  init();
</script>
</body>
</html>
