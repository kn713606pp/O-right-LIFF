<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交請示</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f4f5f7; color: #333; }
    .header { background: #4A235A; color: #fff; padding: 16px 20px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p  { font-size: 12px; opacity: .8; margin-top: 4px; }
    .body { padding: 16px; max-width: 600px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
    .req::after { content: " *"; color: #C62828; }
    input[type=text], textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; color: #333;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #4A235A; }
    textarea { resize: vertical; min-height: 90px; }

    /* 簽核鏈 */
    .chain-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }
    .chain-hint  { font-size: 12px; color: #888; margin-bottom: 10px; }
    .chain-item {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; padding: 10px 12px;
      background: #f9f9fb; border-radius: 8px;
      border: 1.5px solid #e0e0e0;
    }
    .chain-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: #4A235A; color: #fff; font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .chain-select { flex: 1; padding: 6px 10px; border: 1.5px solid #ddd;
                    border-radius: 6px; font-size: 13px; background: #fff; }
    .chain-del {
      width: 28px; height: 28px; border-radius: 50%; border: none;
      background: #ffebee; color: #C62828; font-size: 16px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-add-level {
      width: 100%; padding: 10px; border: 1.5px dashed #4A235A; border-radius: 8px;
      background: transparent; color: #4A235A; font-size: 13px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    .btn-add-level:hover { background: #f3e5f5; }

    .btn-add-file {
      width: 100%; padding: 12px; border: 1.5px dashed #aaa; border-radius: 8px;
      background: #fafafa; color: #555; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center;
    }
    .btn-add-file:active { background: #f0f0f0; }
    .file-list { margin-top: 8px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; background: #f9f0ff; border-radius: 6px;
      margin-bottom: 6px; font-size: 13px; color: #333;
      border: 1px solid #e0c8f0;
    }
    .file-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-del {
      background: none; border: none; color: #999; font-size: 18px;
      cursor: pointer; padding: 0 2px; flex-shrink: 0; line-height: 1;
    }

    .flow-preview {
      margin-top: 10px; padding: 10px 12px; background: #f3e5f5;
      border-radius: 8px; font-size: 12px; color: #4A235A;
      display: none;
    }

    .btn-submit {
      width: 100%; padding: 14px; background: #4A235A; color: #fff;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
    }
    .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
    .err { color: #C62828; font-size: 12px; margin-top: 4px; display: none; }
    #loading { text-align: center; padding: 60px 20px; color: #888; }
    .success { text-align: center; padding: 50px 20px; }
    .success .icon { font-size: 64px; margin-bottom: 16px; }
    .success h2   { font-size: 20px; font-weight: 700; color: #2E7D32; margin-bottom: 8px; }
    .success p    { font-size: 14px; color: #666; margin-bottom: 6px; }
    .chain-flow   { color: #4A235A; font-weight: 600; margin-top: 8px; }
  </style>
</head>
<body>
<div id="loading">載入中…</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>📬 提交請示</h1>
    <p>指定簽核鏈，每關意見自動傳遞</p>
  </div>
  <div class="body">

    <div class="card">
      <label class="req">請示主旨</label>
      <input type="text" id="subject" placeholder="簡要說明請示事項（50字以內）" maxlength="50">
      <div class="err" id="subjectErr">請填寫主旨</div>
    </div>

    <div class="card">
      <label>請示內容說明</label>
      <textarea id="content" placeholder="詳細說明背景、需求、預期結果、金額/數量等（建議填寫，作為各關決策依據）"></textarea>
    </div>

    <div class="card">
      <label>📎 附件（選填）</label>
      <button type="button" class="btn-add-file" onclick="document.getElementById('attachFile').click()">
        ＋ 新增附件（每次選一個，可重複點擊加入多個）
      </button>
      <input type="file" id="attachFile" style="display:none"
        accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip">
      <div class="file-list" id="fileList"></div>
      <div id="fileSizeWarn" style="color:#C62828;font-size:12px;margin-top:4px;display:none">
        ⚠️ 檔案總大小超過 20 MB，請移除部分檔案
      </div>
    </div>

    <div class="card">
      <div class="chain-title req">簽核鏈（由下而上，按順序排列）</div>
      <div class="chain-hint">第1關最先收到，最後一關批准後視為整單通過</div>
      <div id="chainList"></div>
      <button class="btn-add-level" onclick="addLevel()">＋ 加入下一層簽核人</button>
      <div class="flow-preview" id="flowPreview"></div>
      <div class="err" id="chainErr">請至少選擇一位簽核人</div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <label style="margin:0;font-size:13px;font-weight:600;color:#555;">⏰ 自動催簽提醒</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-weight:normal;font-size:13px;color:#555;">
          <input type="checkbox" id="escalateEnabled" checked style="width:16px;height:16px;cursor:pointer;">
          啟用
        </label>
      </div>
      <div id="escalateDaysRow" style="display:flex;align-items:center;gap:8px;font-size:14px;color:#333;">
        <span>若簽核人</span>
        <input type="number" id="escalateDays" value="3" min="1" max="30"
          style="width:56px;padding:6px 8px;border:1.5px solid #ddd;border-radius:6px;font-size:14px;text-align:center;">
        <span>天未回應，自動發送催簽提醒</span>
      </div>
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="submit()">📬 送出請示</button>
  </div>
</div>

<div id="successScreen" style="display:none">
  <div class="body">
    <div class="success">
      <div class="icon">📬</div>
      <h2>請示已送出！</h2>
      <p id="succSubject" style="font-weight:600;font-size:16px;"></p>
      <p class="chain-flow" id="succChain"></p>
      <div id="uploadStatus" style="display:none;margin-top:14px;padding:12px 14px;
        border-radius:8px;font-size:13px;line-height:1.6;text-align:left;"></div>
      <p style="margin-top:16px;font-size:13px;color:#888;">第一關審核人已收到通知<br>傳「我的請示」可查看審核進度</p>
    </div>
  </div>
</div>

<script>
const GAS = window.GAS_URL;
let myId = "", myName = "";
let membersMap = {};   // lineId → member
let approverOptions = [];  // [{value, label}] managers+admins only
let pendingFiles = [];  // 累積選取的附件

async function init() {
  await liff.init({ liffId: window.LIFF_ID });
  if (!liff.isLoggedIn()) { liff.login(); return; }
  const p = await liff.getProfile();
  myId   = p.userId;
  myName = p.displayName;

  try {
    const res  = await fetch(GAS + "?action=getMembersList");
    const data = await res.json();
    const all  = data.members || [];
    all.forEach(m => { membersMap[m.lineId] = m; });
    const DEPT_ORDER = ["董事長室", "總經理室", "董總辦公室"];
    const deptPri = d => { const i = DEPT_ORDER.indexOf(d || ""); return i >= 0 ? i : 999; };
    approverOptions = all
      .filter(m => (m.role === "admin" || m.role === "manager") && m.lineId !== myId)
      .sort((a, b) => {
        const pa = deptPri(a.dept), pb = deptPri(b.dept);
        if (pa !== pb) return pa - pb;
        if (a.role !== b.role) return a.role === "admin" ? -1 : 1;
        return (a.name || "").localeCompare(b.name || "", "zh-Hant");
      })
      .map(m => ({
        value: m.lineId,
        label: (m.role === "admin" ? "👑" : "🏷️") + " " + m.name + (m.dept ? "（" + m.dept + "）" : ""),
      }));

    if (approverOptions.length === 0) {
      document.getElementById("loading").innerHTML =
        "<div style='padding:32px 20px;text-align:center;'>"
        + "<p style='font-size:32px;'>⚠️</p>"
        + "<p style='color:#C62828;font-weight:700;font-size:16px;margin-top:12px;'>成員名單中尚無可選的簽核人</p>"
        + "<p style='color:#555;font-size:13px;margin-top:10px;line-height:1.8;'>"
        + "請簽核人先在 LINE Bot 傳送「登記」完成登記，<br>"
        + "再由管理員到「成員名單」工作表<br>將簽核人的角色設為 <strong>manager</strong> 或 <strong>admin</strong>。</p>"
        + "<p style='color:#888;font-size:12px;margin-top:16px;'>"
        + "或在 LINE Bot 傳：<br><strong>設定角色 [UID] manager [部門名稱]</strong></p>"
        + "</div>";
      return;
    }

    addLevel();  // 預設一關

    // 催簽啟用/停用切換
    document.getElementById("escalateEnabled").addEventListener("change", function() {
      document.getElementById("escalateDaysRow").style.opacity = this.checked ? "1" : "0.4";
    });

    // 附件逐一加入
    document.getElementById("attachFile").addEventListener("change", function() {
      if (!this.files.length) return;
      pendingFiles.push(this.files[0]);
      this.value = "";  // 重置，讓同一檔案可再次選取
      renderFileList();
    });

    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display     = "block";
  } catch (e) {
    document.getElementById("loading").innerHTML =
      "<p style='padding:40px;text-align:center;color:#C62828;'>載入失敗，請重試</p>";
  }
}

function addLevel() {
  const list  = document.getElementById("chainList");
  const idx   = list.children.length;
  const item  = document.createElement("div");
  item.className = "chain-item";
  item.dataset.index = idx;

  const num = document.createElement("div");
  num.className = "chain-num";
  num.textContent = idx + 1;

  const sel = document.createElement("select");
  sel.className = "chain-select";
  sel.innerHTML = '<option value="">— 選擇簽核人 —</option>'
    + approverOptions.map(o => `<option value="${o.value}">${o.label}</option>`).join("");
  sel.addEventListener("change", updatePreview);

  const del = document.createElement("button");
  del.className = "chain-del";
  del.textContent = "×";
  del.onclick = function() {
    if (list.children.length <= 1) return; // 至少保留一關
    list.removeChild(item);
    renumber();
    updatePreview();
  };

  item.appendChild(num);
  item.appendChild(sel);
  item.appendChild(del);
  list.appendChild(item);
  updatePreview();
}

function renumber() {
  const items = document.getElementById("chainList").children;
  for (let i = 0; i < items.length; i++) {
    items[i].querySelector(".chain-num").textContent = i + 1;
    items[i].dataset.index = i;
  }
}

function getChain() {
  const items = document.getElementById("chainList").children;
  const ids = [], names = [];
  for (const item of items) {
    const v = item.querySelector("select").value;
    if (v) {
      ids.push(v);
      names.push(membersMap[v] ? membersMap[v].name : v);
    }
  }
  return { ids, names };
}

function updatePreview() {
  const { ids, names } = getChain();
  const box = document.getElementById("flowPreview");
  if (names.length === 0) { box.style.display = "none"; return; }
  box.style.display = "block";
  box.textContent = "您 → " + names.join(" → ") + " → 批准完成";
}

async function submit() {
  const btn = document.getElementById("btnSubmit");
  if (btn.disabled) return;
  btn.disabled    = true;
  btn.textContent = "送出中…";

  const subject = document.getElementById("subject").value.trim();
  const content = document.getElementById("content").value.trim();
  const { ids, names } = getChain();

  document.getElementById("subjectErr").style.display = !subject ? "block" : "none";
  document.getElementById("chainErr").style.display   = ids.length === 0 ? "block" : "none";
  if (!subject || ids.length === 0) {
    btn.disabled    = false;
    btn.textContent = "📬 送出請示";
    return;
  }

  const escalateEnabled = document.getElementById("escalateEnabled").checked;
  const escalateDays    = escalateEnabled
    ? (parseInt(document.getElementById("escalateDays").value) || 3)
    : 0;

  const p = new URLSearchParams({
    action:        "createRequest",
    userId:        myId,
    requesterName: myName,
    approverIds:   ids.join(","),
    approverNames: names.join(","),
    subject:       subject,
    content:       content,
    escalateDays:  escalateDays,
  });

  try {
    const res  = await fetch(GAS + "?" + p.toString());
    const data = await res.json();
    if (data.status === "ok") {
      const requestId = data.requestId || "";
      document.getElementById("app").style.display           = "none";
      document.getElementById("successScreen").style.display = "block";
      document.getElementById("succSubject").textContent = subject;
      document.getElementById("succChain").textContent   = "簽核鏈：" + names.join(" → ");
      if (pendingFiles.length > 0 && requestId) {
        uploadAttachment(pendingFiles.slice(), requestId);
      }
    } else {
      alert("送出失敗：" + (data.error || "未知錯誤"));
      btn.disabled = false; btn.textContent = "📬 送出請示";
    }
  } catch (e) {
    alert("網路錯誤，請稍後再試");
    btn.disabled = false; btn.textContent = "📬 送出請示";
  }
}

function renderFileList() {
  const list    = document.getElementById("fileList");
  const warnEl  = document.getElementById("fileSizeWarn");
  list.innerHTML = "";
  const totalSize = pendingFiles.reduce((s, f) => s + f.size, 0);
  pendingFiles.forEach((f, idx) => {
    const item = document.createElement("div");
    item.className = "file-item";
    const nameEl = document.createElement("span");
    nameEl.className   = "file-item-name";
    nameEl.textContent = "📎 " + f.name + "（" + (f.size / 1024).toFixed(0) + " KB）";
    const delBtn = document.createElement("button");
    delBtn.type      = "button";
    delBtn.className = "file-del";
    delBtn.textContent = "×";
    delBtn.onclick   = () => { pendingFiles.splice(idx, 1); renderFileList(); };
    item.appendChild(nameEl);
    item.appendChild(delBtn);
    list.appendChild(item);
  });
  warnEl.style.display = totalSize > 20 * 1024 * 1024 ? "block" : "none";
}

async function uploadAttachment(files, requestId) {
  const statusEl = document.getElementById("uploadStatus");
  statusEl.style.display = "block";
  statusEl.style.background = "#fff8e1";
  statusEl.style.color = "#555";
  statusEl.textContent = "⏳ 附件上傳中（0 / " + files.length + "）…";

  let successCount = 0, failCount = 0;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    statusEl.textContent = "⏳ 附件上傳中（" + (i + 1) + " / " + files.length + "）：" + file.name;
    try {
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = e => resolve(e.target.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const res = await fetch(GAS, {
        method: "POST",
        body: JSON.stringify({
          action:     "uploadFile",
          requestId:  requestId,
          userId:     myId,
          fileName:   file.name,
          mimeType:   file.type || "application/octet-stream",
          fileBase64: base64,
        }),
      });
      const data = await res.json();
      if (data.status === "ok") { successCount++; } else { throw new Error(data.error || "上傳失敗"); }
    } catch (err) { failCount++; }
  }

  if (failCount === 0) {
    statusEl.style.background = "#e8f5e9";
    statusEl.style.color      = "#2E7D32";
    statusEl.textContent      = "✅ " + successCount + " 個附件已關聯到請示，審核人可直接開啟。";
  } else if (successCount > 0) {
    statusEl.style.background = "#fff3e0";
    statusEl.style.color      = "#E65100";
    statusEl.textContent      = "⚠️ " + successCount + " 個成功，" + failCount + " 個失敗。失敗的請傳給 Bot 後輸入：關聯 " + requestId;
  } else {
    statusEl.style.background = "#fff3e0";
    statusEl.style.color      = "#E65100";
    statusEl.innerHTML = "⚠️ 附件未能自動關聯<br>請將檔案傳給 Bot，再輸入：<br><strong>關聯 " + requestId + "</strong>";
  }
}

init();
</script>
</body>
</html>
