<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交請示</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f5f5f5; color: #333; }
    .header { background: #4A235A; color: #fff; padding: 16px 20px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p  { font-size: 12px; opacity: .8; margin-top: 4px; }
    .body { padding: 16px; max-width: 600px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
    .required::after { content: " *"; color: #C62828; }
    input, select, textarea {
      width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; color: #333;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #4A235A; }
    textarea { resize: vertical; min-height: 100px; }
    .recipient-info { margin-top: 6px; font-size: 12px; color: #888; min-height: 18px; }
    .btn-submit {
      width: 100%; padding: 14px; background: #4A235A; color: #fff;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }
    .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
    .success { text-align: center; padding: 40px 20px; }
    .success .icon { font-size: 64px; margin-bottom: 16px; }
    .success h2 { font-size: 20px; font-weight: 700; color: #2E7D32; margin-bottom: 8px; }
    .success p  { font-size: 14px; color: #666; margin-bottom: 4px; }
    .error-msg { color: #C62828; font-size: 12px; margin-top: 4px; display: none; }
    #loading { text-align: center; padding: 60px 20px; color: #888; }
  </style>
</head>
<body>

<div id="loading">載入中…</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>📬 提交請示</h1>
    <p>向主管或管理員提交請示、申請或諮詢</p>
  </div>

  <div class="body">
    <div class="card">
      <label class="required">請示對象</label>
      <select id="recipient">
        <option value="">— 選擇主管 —</option>
      </select>
      <div class="recipient-info" id="recipientInfo"></div>
    </div>

    <div class="card">
      <label class="required">請示主旨</label>
      <input type="text" id="subject" placeholder="簡短說明請示事項（20字以內）" maxlength="50">
      <div class="error-msg" id="subjectErr">請填寫主旨</div>
    </div>

    <div class="card">
      <label>請示內容</label>
      <textarea id="content" placeholder="詳細說明背景、需求、預期結果等（選填，但建議填寫）"></textarea>
    </div>

    <button class="btn-submit" id="btnSubmit" onclick="submitRequest()">📬 送出請示</button>
  </div>
</div>

<div id="successScreen" style="display:none" class="body">
  <div class="success">
    <div class="icon">📬</div>
    <h2>請示已送出！</h2>
    <p id="successMsg1"></p>
    <p id="successMsg2" style="color:#4A235A; font-weight:600; margin-top:12px;"></p>
    <p style="margin-top:20px; font-size:13px; color:#888;">
      傳「我的請示」可查看審核狀態
    </p>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx6_x9UZIhKAidFXzuXzY7UVEb4-s0_NHXuQIb5hQKWA-1p9aaq7VXK77DizT1UCAXL/exec";
let myUserId = "";
let myName   = "";
let membersMap = {};  // lineId -> member

async function init() {
  await liff.init({ liffId: "2009974832-1tuzOcJQ" });
  if (!liff.isLoggedIn()) { liff.login(); return; }

  const profile = await liff.getProfile();
  myUserId = profile.userId;
  myName   = profile.displayName;

  // Load managers/admins
  const url = GAS_URL + "?action=getMembers&userId=" + myUserId;
  try {
    const res  = await fetch(url);
    const data = await res.json();
    if (data.error) {
      // Not admin — load all members via checkRole fallback
      // Just show all members from public endpoint is not available,
      // so we'll use a workaround: getMembers with the current user.
      // If not admin, we show a message.
      document.getElementById("loading").innerHTML =
        "<p style='padding:40px;text-align:center;color:#C62828;'>⛔ 載入失敗。請確認您已加入成員名單。</p>";
      return;
    }
    const members = data.members || [];
    const sel = document.getElementById("recipient");
    members
      .filter(function(m) { return m.role === "admin" || m.role === "manager"; })
      .filter(function(m) { return m.lineId !== myUserId; })
      .forEach(function(m) {
        membersMap[m.lineId] = m;
        const opt = document.createElement("option");
        opt.value       = m.lineId;
        opt.textContent = (m.role === "admin" ? "👑 " : "🏷️ ")
                        + m.name + (m.dept ? "（" + m.dept + "）" : "");
        sel.appendChild(opt);
      });
    sel.addEventListener("change", function() {
      const m = membersMap[sel.value];
      document.getElementById("recipientInfo").textContent =
        m ? "部門：" + (m.dept || "—") + "　角色：" + m.role : "";
    });
  } catch (err) {
    document.getElementById("loading").innerHTML =
      "<p style='padding:40px;text-align:center;color:#C62828;'>⛔ 網路錯誤，請稍後再試。</p>";
    return;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display     = "block";
}

async function submitRequest() {
  const recipientId   = document.getElementById("recipient").value;
  const subject       = document.getElementById("subject").value.trim();
  const content       = document.getElementById("content").value.trim();
  const subjectErr    = document.getElementById("subjectErr");

  let valid = true;
  subjectErr.style.display = "none";

  if (!subject) { subjectErr.style.display = "block"; valid = false; }
  if (!recipientId) { alert("請選擇請示對象"); valid = false; }
  if (!valid) return;

  const btn = document.getElementById("btnSubmit");
  btn.disabled    = true;
  btn.textContent = "送出中…";

  const recipientMember = membersMap[recipientId] || {};
  const params = new URLSearchParams({
    action:          "createRequest",
    userId:          myUserId,
    requesterName:   myName,
    recipientLineId: recipientId,
    recipientName:   recipientMember.name || "",
    subject:         subject,
    content:         content,
  });

  try {
    const res  = await fetch(GAS_URL + "?" + params.toString());
    const data = await res.json();
    if (data.status === "ok") {
      document.getElementById("app").style.display           = "none";
      document.getElementById("successScreen").style.display = "block";
      document.getElementById("successMsg1").textContent =
        "已送出給「" + (recipientMember.name || "主管") + "」，對方將收到通知。";
      document.getElementById("successMsg2").textContent = "請示 ID：" + data.requestId;
    } else {
      alert("送出失敗：" + (data.error || "未知錯誤"));
      btn.disabled    = false;
      btn.textContent = "📬 送出請示";
    }
  } catch (err) {
    alert("網路錯誤，請稍後再試");
    btn.disabled    = false;
    btn.textContent = "📬 送出請示";
  }
}

init();
</script>
</body>
</html>
