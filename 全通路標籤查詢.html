function fold(s){s=(s||"").toLowerCase();var o="";for(var i=0;i<s.length;i++){o+=FOLD[s[i]]||s[i];}return o;}

function certChip(name,val){var e=EMOJI[name]||"✔";var t=name;if(val&&val!=="v"&&val.length<=8)t+=" "+val.replace(/\(.*\)/,"");var cls=(name.indexOf("再生")>=0||name.indexOf("零碳")>=0||name.indexOf("風力")>=0||name.indexOf("USDA")>=0)?"chip eco":"chip";return '<span class="'+cls+'">'+e+' '+t+'</span>';}

function inCard(r){var img='../assets/標籤圖/國際/'+r.img;var sz=(r.sizes||[]).map(function(s){return '<span class="sz">'+s+'</span>';}).join('');var zh=(r.zh_names||[]).join('｜');return '<div class="card"><div class="ph" onclick="zoom(\''+img+'\')"><img loading="lazy" src="'+img+'"></div><div class="bd"><div class="nm">'+hl(r.file,Q)+'</div>'+(zh?'<div class="meta">'+hl(zh,Q)+'</div>':'')+'<div style="margin-top:5px">'+sz+'</div></div></div>';}
function ceCard(r){var chips=r.cert_list.map(function(c){return certChip(c,r.certs[c]);}).join('');return '<div class="card"><div class="bd"><div class="nm">'+hl(r.name,Q)+(r.ml&&r.ml.length?' <span class="meta">'+r.ml.join('/')+'</span>':'')+'</div><div class="chips">'+chips+'</div></div></div>';}

function match(hay,q){return fold(hay).indexOf(q)>=0;}
function render(){

}
