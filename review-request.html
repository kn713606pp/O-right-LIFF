<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>審核請示</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f4f5f7; color: #333; }
    .header { background: #4A235A; color: #fff; padding: 16px 20px; }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header p  { font-size: 12px; opacity: .8; margin-top: 4px; }
    .body { padding: 16px; max-width: 600px; margin: 0 auto; }
    .card { background: #fff; border-radius: 12px; padding: 16px;
            margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .meta { font-size: 12px; color: #888; margin-bottom: 4px; }
    .subject { font-size: 18px; font-weight: 700; margin: 8px 0 4px; }
    .level-badge {
      display: inline-block; padding: 3px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 700; background: #ede7f6; color: #4A235A;
      margin-bottom: 8px;
    }
    .escalate-badge { background: #fff3e0; color: #E65100; }
    .content-box {
      background: #f9f9fb; border-radius: 8px; padding: 12px;
      font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: #444;
      margin-top: 8px;
    }

    /* 前關意見 */
    .prev-comments { margin-top: 10px; }
    .prev-comments .title { font-size: 12px; font-weight: 700; color: #F57F17; margin-bottom: 6px; }
    .comment-item {
      padding: 8px 10px; background: #fff8e1; border-left: 3px solid #FFD54F;
      border-radius: 4px; margin-bottom: 6px; font-size: 13px;
    }
    .comment-item .who  { font-weight: 700; color: #555; }
    .comment-item .dec  { font-weight: 700; margin-left: 4px; }
    .comment-item .txt  { color: #666; margin-top: 3px; font-size: 12px; }
    .comment-item .time { color: #aaa; font-size: 11px; }
    .dec-approve { color: #2E7D32; }
    .dec-reject  { color: #C62828; }
    .dec-info    { color: #E65100; }
    .dec-escalate{ color: #4A235A; }

    /* 鏈條顯示 */
    .chain-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .chain-node {
      padding: 4px 10px; border-radius: 20px; font-size: 12px;
      background: #ede7f6; color: #4A235A;
    }
    .chain-node.active { background: #4A235A; color: #fff; font-weight: 700; }
    .chain-node.done   { background: #e8f5e9; color: #2E7D32; }
    .chain-arrow { color: #aaa; font-size: 12px; }

    label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
    textarea, select {
      width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px;
    }
    textarea { resize: vertical; min-height: 80px; }
    textarea:focus, select:focus { outline: none; border-color: #4A235A; }

    .btn-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .btn {
      flex: 1; min-width: 80px; padding: 12px 8px; border: none;
      border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer;
      touch-action: manipulation;
    }
    .btn-approve  { background: #2E7D32; color: #fff; }
    .btn-reject   { background: #C62828; color: #fff; }
    .btn-info     { background: #E65100; color: #fff; }
    .btn-escalate { background: #4A235A; color: #fff; }
    .btn:disabled { background: #aaa; cursor: not-allowed; pointer-events: none; opacity: 0.6; }

    /* 加簽選人 */
    #escalatePanel { display: none; margin-top: 12px; padding: 12px;
                     background: #f3e5f5; border-radius: 8px; }
    #escalatePanel label { color: #4A235A; }

    .success { text-align: center; padding: 50px 20px; }
    .success .icon { font-size: 64px; margin-bottom: 16px; }
    .success h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    #loading { text-align: center; padding: 60px 20px; color: #888; }
    .already-done { text-align: center; padding: 40px 20px; color: #666; }
    .status-badge {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 13px; font-weight: 600; margin-top: 8px;
    }
    .s-pending  { background: #fff3e0; color: #E65100; }
    .s-approved { background: #e8f5e9; color: #2E7D32; }
    .s-rejected { background: #ffebee; color: #C62828; }
    .s-info     { background: #fff8e1; color: #F57F17; }
  </style>
</head>
<body>
<div id="loading">載入中…</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>📋 審核請示</h1>
    <p id="headerSub">填寫意見並選擇批准 / 退回 / 加簽</p>
  </div>
  <div class="body">
    <div class="card" id="reqDetail"></div>
    <div class="card" id="replyPanel">
      <label>您的審核意見（選填，但建議填寫作為決策依據）</label>
      <textarea id="comment" placeholder="填寫批准條件、退回原因、補充需求，或說明為何加簽至上級…"></textarea>

      <div id="escalatePanel">
        <label>加簽對象（插入至您之後，待對方決策）</label>
        <select id="escalatePerson">
          <option value="">— 選擇加簽主管 —</option>
        </select>
      </div>

      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-approve"  id="btnApprove"  onclick="doAction('approve')">✅ 批准</button>
        <button class="btn btn-reject"   id="btnReject"   onclick="doAction('reject')">❌ 退回</button>
        <button class="btn btn-info"     id="btnInfo"     onclick="doAction('info')">⚠️ 補充</button>
        <button class="btn btn-escalate" id="btnEscalate" onclick="toggleEscalate()">🔼 加簽</button>
      </div>
      <p id="escalateSubmitRow" style="display:none;margin-top:8px;">
        <button class="btn btn-escalate" style="width:100%;" onclick="doAction('escalate')">🔼 確認加簽送出</button>
      </p>
    </div>
  </div>
</div>

<div id="successScreen" style="display:none">
  <div class="body">
    <div class="success">
      <div class="icon" id="succIcon"></div>
      <h2 id="succTitle"></h2>
      <p id="succDesc" style="color:#666;font-size:14px;"></p>
      <p style="margin-top:20px;font-size:13px;color:#888;">已通知相關人員，可關閉此頁面。</p>
    </div>
  </div>
</div>

<!-- 轉成任務 Bottom Sheet -->
<div id="convertOverlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;overflow-y:auto;">
  <div style="background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 32px;position:absolute;bottom:0;left:0;right:0;max-height:85vh;overflow-y:auto;">
    <div style="font-size:18px;font-weight:700;color:#2E7D32;margin-bottom:4px;">✅ 請示已全程批准！</div>
    <div style="font-size:14px;color:#666;margin-bottom:16px;">是否將此請示轉成執行任務？</div>

    <div style="margin-bottom:12px;">
      <label style="font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:6px;">任務名稱</label>
      <input type="text" id="conv-name" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;" placeholder="預設同請示主旨">
    </div>

    <div style="margin-bottom:12px;">
      <label style="font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:6px;">指派給 <span style="color:#C62828;">*</span></label>
      <select id="conv-assignees" multiple style="width:100%;padding:8px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;min-height:96px;"></select>
      <div style="font-size:12px;color:#888;margin-top:4px;">長按或按住 Ctrl/Cmd 可多選</div>
    </div>

    <div style="margin-bottom:12px;">
      <label style="font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:6px;">截止日期 <span style="color:#C62828;">*</span></label>
      <input type="date" id="conv-due" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;">
    </div>

    <div style="margin-bottom:16px;">
      <label style="font-size:13px;font-weight:600;color:#555;display:block;margin-bottom:6px;">需回報的資料</label>
      <input type="text" id="conv-reqdata" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;" placeholder="例：執行結果、完成報告">
    </div>

    <button id="btnConvert" onclick="convertToTask()" style="width:100%;padding:14px;background:#2E7D32;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;">✅ 轉成任務並通知</button>
    <button onclick="skipConvert()" style="width:100%;padding:12px;background:#f4f5f7;color:#555;border:1.5px solid #ddd;border-radius:10px;font-size:14px;cursor:pointer;">略過，不轉換</button>
  </div>
</div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbx6_x9UZIhKAidFXzuXzY7UVEb4-s0_NHXuQIb5hQKWA-1p9aaq7VXK77DizT1UCAXL/exec";
let myId = "", myName = "";
let reqData = null;
let membersMap = {};
let escalateShowing = false;

function qp(k) { return new URLSearchParams(location.search).get(k) || ""; }

async function init() {
  const reqId = qp("reqId");
  if (!reqId) {
    document.getElementById("loading").innerHTML =
      "<p style='padding:40px;text-align:center;color:#C62828;'>❌ 缺少請示 ID</p>";
    return;
  }
  await liff.init({ liffId: "2009974832-1tuzOcJQ" });
  if (!liff.isLoggedIn()) { liff.login(); return; }
  const prof = await liff.getProfile();
  myId   = prof.userId;
  myName = prof.displayName;

  try {
    // 取請示詳情
    const detRes  = await fetch(GAS + "?action=getRequests&type=detail&userId=" + myId + "&requestId=" + reqId);
    const detData = await detRes.json();
    if (detData.error) {
      document.getElementById("loading").innerHTML =
        "<p style='padding:40px;text-align:center;color:#C62828;'>❌ " + detData.error + "</p>";
      return;
    }
    reqData = detData;

    // 取成員清單（供加簽選人）
    const mRes  = await fetch(GAS + "?action=getMembersList");
    const mData = await mRes.json();
    (mData.members || []).forEach(m => { membersMap[m.lineId] = m; });

    const escSel = document.getElementById("escalatePerson");
    (mData.members || [])
      .filter(m => (m.role === "admin" || m.role === "manager") && m.lineId !== myId)
      .forEach(m => {
        const opt = document.createElement("option");
        opt.value       = m.lineId;
        opt.textContent = (m.role === "admin" ? "👑" : "🏷️") + " " + m.name + (m.dept ? "（" + m.dept + "）" : "");
        escSel.appendChild(opt);
      });

    renderDetail();
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display     = "block";

    // 判斷顯示哪個面板
    const currentApproverId = reqData.approverIds[reqData.currentLevel];
    const myChainLevel      = reqData.approverIds.indexOf(myId);
    const isRequester       = reqData.requesterLineId
      ? reqData.requesterLineId === myId
      : myChainLevel === -1;

    if (isRequester) {
      document.querySelector(".header h1").textContent = "📬 查看請示";
      document.getElementById("headerSub").textContent = "查看您提交的請示進度";
    }

    const isDone = reqData.status !== "待審核" && reqData.status !== "需補充";
    if (isDone) {
      showDonePanel(isRequester);
    } else if (currentApproverId === myId) {
      // 正常審核面板（預設顯示）
    } else if (myChainLevel > reqData.currentLevel) {
      // 上層主管：可跳關代審
      showSkipPanel(myChainLevel);
    } else if (isRequester) {
      showRequesterPanel();
    } else {
      document.getElementById("replyPanel").innerHTML =
        "<div class='already-done'><p style='font-size:28px;'>👀</p>"
        + "<p style='margin-top:10px;font-weight:700;'>目前輪到其他人審核</p>"
        + "<p style='margin-top:6px;color:#666;font-size:13px;'>第 " + (reqData.currentLevel + 1) + " 關審核人：" + (reqData.approverNames[reqData.currentLevel] || "？") + "</p></div>";
    }
  } catch (e) {
    document.getElementById("loading").innerHTML =
      "<p style='padding:40px;text-align:center;color:#C62828;'>載入失敗：" + e.message + "</p>";
  }
}

function renderDetail() {
  const statusClass = { "待審核": "s-pending", "已批准": "s-approved", "已退回": "s-rejected", "需補充": "s-info" };
  const lvl   = reqData.currentLevel;
  const total = reqData.approverIds.length;

  // 簽核鏈條
  let chainHtml = "<div class='chain-bar'>";
  reqData.approverNames.forEach((n, i) => {
    if (i > 0) chainHtml += "<span class='chain-arrow'>→</span>";
    const cls = i < lvl ? "chain-node done" : i === lvl ? "chain-node active" : "chain-node";
    chainHtml += "<span class='" + cls + "'>" + (i < lvl ? "✓ " : "") + n + "</span>";
  });
  chainHtml += "</div>";

  // 前關意見
  let commentsHtml = "";
  if (reqData.comments && reqData.comments.length > 0) {
    const decColors = { "批准": "dec-approve", "退回": "dec-reject", "需補充": "dec-info", "加簽": "dec-escalate" };
    const items = reqData.comments.map(c => {
      const cls = decColors[c.decision] || "";
      return "<div class='comment-item'>"
        + "<div><span class='who'>第" + c.level + "關 " + c.name + "</span>"
        + "<span class='dec " + cls + "'>【" + c.decision + "】</span>"
        + "<span class='time'> " + (c.time || "").substring(0, 16) + "</span></div>"
        + (c.comment ? "<div class='txt'>" + esc(c.comment) + "</div>" : "")
        + "</div>";
    }).join("");
    commentsHtml = "<div class='prev-comments'>"
      + "<div class='title'>前關審核意見（決策參考）</div>" + items + "</div>";
  }

  document.getElementById("reqDetail").innerHTML =
    "<div class='meta'>請示人：" + reqData.requesterName + "　提交：" + reqData.createdTime + "</div>"
    + "<div class='subject'>" + esc(reqData.subject) + "</div>"
    + "<span class='status-badge " + (statusClass[reqData.status] || "s-pending") + "'>" + reqData.status + "</span>"
    + "<span class='level-badge' style='margin-left:6px;'>第 " + (lvl + 1) + " 關 / 共 " + total + " 關</span>"
    + chainHtml
    + (reqData.content ? "<div class='content-box'>" + escWithLinks(reqData.content) + "</div>" : "")
    + commentsHtml;
}

function showDonePanel(isOwner) {
  const statusClass = { "已批准": "s-approved", "已退回": "s-rejected", "需補充": "s-info" };
  const icon = reqData.status === "已批准" ? "✅" : reqData.status === "已退回" ? "❌" : "⚠️";
  const hint = isOwner && reqData.status === "已退回"
    ? "<p style='margin-top:12px;font-size:13px;color:#888;'>可重新提交新的請示。</p>" : "";
  document.getElementById("replyPanel").innerHTML =
    "<div class='already-done'><p style='font-size:32px;'>" + icon + "</p>"
    + "<p style='margin-top:12px;font-weight:700;'>此請示已審核完畢</p>"
    + "<p style='margin-top:6px;'><span class='status-badge " + (statusClass[reqData.status] || "") + "'>" + reqData.status + "</span></p>"
    + hint + "</div>";
}

function showRequesterPanel() {
  const lvl  = reqData.currentLevel;
  const appr = reqData.approverNames[lvl] || "？";
  document.getElementById("replyPanel").innerHTML =
    "<div style='text-align:center;padding:16px 0 8px'>"
    + "<p style='font-size:28px;'>📬</p>"
    + "<p style='margin-top:8px;font-weight:700;'>您的請示進行中</p>"
    + "<p style='margin-top:6px;font-size:13px;color:#666;'>第 " + (lvl + 1) + " 關（" + esc(appr) + "）審核中</p>"
    + "</div>"
    + "<button id='btnWithdraw' onclick='doWithdraw()' style='width:100%;margin-top:8px;padding:12px;"
    + "background:#ffebee;color:#C62828;border:1.5px solid #EF9A9A;border-radius:10px;"
    + "font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;'>🔙 收回請示</button>"
    + "<p style='font-size:12px;color:#aaa;margin-top:8px;text-align:center;'>收回後可重新修改並提交</p>";
}

async function doWithdraw() {
  const btn = document.getElementById("btnWithdraw");
  if (!btn || btn.disabled) return;
  if (!confirm("確定要收回此請示？目前關的審核人將會收到通知。")) return;
  btn.disabled = true; btn.style.opacity = "0.6"; btn.textContent = "收回中…";
  try {
    const res  = await fetch(GAS + "?action=withdrawRequest&userId=" + myId + "&requestId=" + reqData.requestId);
    const data = await res.json();
    if (data.status === "ok") {
      showSuccess("🔙", "請示已收回", "審核人已收到通知。\n如需重新提交，請開啟「請示」頁面。");
    } else {
      alert("失敗：" + (data.error || "未知錯誤"));
      btn.disabled = false; btn.style.opacity = ""; btn.textContent = "🔙 收回請示";
    }
  } catch(e) {
    alert("網路錯誤，請稍後再試");
    btn.disabled = false; btn.style.opacity = ""; btn.textContent = "🔙 收回請示";
  }
}

function showSkipPanel(myLevel) {
  const lvl         = reqData.currentLevel;
  const blockedName = reqData.approverNames[lvl] || ("第" + (lvl + 1) + "關審核人");
  const myName2     = reqData.approverNames[myLevel] || "您";
  const skipped     = myLevel - lvl;

  document.getElementById("replyPanel").innerHTML =
    "<div style='background:#fff3e0;border-radius:8px;padding:12px;margin-bottom:12px;'>"
    + "<p style='color:#E65100;font-weight:700;font-size:14px;'>⚡ 跳關簽核</p>"
    + "<p style='font-size:13px;margin-top:6px;color:#555;'>"
    + "您是第 " + (myLevel + 1) + " 關審核人（" + esc(myName2) + "）<br>"
    + "目前第 " + (lvl + 1) + " 關（" + esc(blockedName) + "）尚未審核。<br>"
    + "跳關後，中間 " + skipped + " 關將標記為「已跳過」。"
    + "</p></div>"
    + "<label>跳關審核意見（建議填寫說明原因）</label>"
    + "<textarea id='skipComment' placeholder='說明為何跳關代審，例如：情況緊急，授權逕行批准' style='margin-top:6px;width:100%;padding:10px;border:1.5px solid #ddd;border-radius:8px;min-height:70px;font-size:14px;'></textarea>"
    + "<div class='btn-row' style='margin-top:12px;'>"
    + "<button class='btn btn-approve' id='skipApprove' onclick='doSkip(\"approve\")'>✅ 跳關批准</button>"
    + "<button class='btn btn-reject'  id='skipReject'  onclick='doSkip(\"reject\")'>❌ 跳關退回</button>"
    + "</div>";
}

async function doSkip(decision) {
  const comment = (document.getElementById("skipComment") || {}).value || "";
  ["skipApprove", "skipReject"].forEach(function(id) {
    var b = document.getElementById(id);
    if (b) b.disabled = true;
  });

  const p = new URLSearchParams({
    action:    "skipLevel",
    userId:    myId,
    requestId: reqData.requestId,
    decision:  decision,
    comment:   comment.trim(),
  });
  try {
    const res  = await fetch(GAS + "?" + p.toString());
    const data = await res.json();
    if (data.status === "ok") {
      showSuccess(
        decision === "approve" ? "✅" : "❌",
        decision === "approve" ? "已跳關批准" : "已跳關退回",
        "已記錄跳關簽核，相關人員已收到通知。"
      );
    } else {
      alert("失敗：" + (data.error || "未知錯誤"));
      ["skipApprove", "skipReject"].forEach(function(id) {
        var b = document.getElementById(id);
        if (b) b.disabled = false;
      });
    }
  } catch (e) {
    alert("網路錯誤，請重試");
    ["skipApprove", "skipReject"].forEach(function(id) {
      var b = document.getElementById(id);
      if (b) b.disabled = false;
    });
  }
}

function toggleEscalate() {
  escalateShowing = !escalateShowing;
  document.getElementById("escalatePanel").style.display      = escalateShowing ? "block" : "none";
  document.getElementById("escalateSubmitRow").style.display  = escalateShowing ? "block" : "none";
}

async function doAction(type) {
  const comment   = document.getElementById("comment").value.trim();
  const allBtns   = ["btnApprove","btnReject","btnInfo","btnEscalate"];
  let actionLabel = "", actionColor = "", actionIcon = "";

  if (type === "escalate") {
    const escId = document.getElementById("escalatePerson").value;
    if (!escId) { alert("請選擇加簽對象"); return; }
    const escName = (membersMap[escId] || {}).name || escId;
    allBtns.forEach(id => { document.getElementById(id).disabled = true; });

    const p = new URLSearchParams({
      action:          "escalateRequest",
      userId:          myId,
      requestId:       reqData.requestId,
      newApproverId:   escId,
      newApproverName: escName,
      comment:         comment,
    });
    try {
      const res  = await fetch(GAS + "?" + p.toString());
      const data = await res.json();
      if (data.status === "ok") {
        showSuccess("🔼", "已加簽送出", "已加簽至「" + escName + "」，並通知起單人。");
      } else {
        alert("失敗：" + (data.error || "未知錯誤"));
        allBtns.forEach(id => { document.getElementById(id).disabled = false; });
      }
    } catch (e) {
      alert("網路錯誤，請重試");
      allBtns.forEach(id => { document.getElementById(id).disabled = false; });
    }
    return;
  }

  allBtns.forEach(id => { document.getElementById(id).disabled = true; });

  const p = new URLSearchParams({
    action:    "approveRequest",
    userId:    myId,
    requestId: reqData.requestId,
    decision:  type,
    comment:   comment,
  });
  const iconMap  = { approve: "✅", reject: "❌", info: "⚠️" };
  const titleMap = { approve: "已批准", reject: "已退回", info: "已標記需補充" };
  const descMap  = {
    approve: "已送至下一關（或完成最終批准），起單人已收到通知。",
    reject:  "已退回，起單人已收到通知。",
    info:    "已通知起單人補充資料。",
  };

  try {
    const res  = await fetch(GAS + "?" + p.toString());
    const data = await res.json();
    if (data.status === "ok") {
      if (type === "approve" && data.finalApproval) {
        showConvertPanel();
      } else {
        showSuccess(iconMap[type], titleMap[type], descMap[type]);
      }
    } else {
      alert("操作失敗：" + (data.error || "未知錯誤"));
      allBtns.forEach(id => { document.getElementById(id).disabled = false; });
    }
  } catch (e) {
    alert("網路錯誤，請重試");
    allBtns.forEach(id => { document.getElementById(id).disabled = false; });
  }
}

function showConvertPanel() {
  document.getElementById("app").style.display = "none";
  document.getElementById("conv-name").value   = reqData.subject;

  var d = new Date();
  d.setDate(d.getDate() + 7);
  document.getElementById("conv-due").value = d.toISOString().split("T")[0];

  var sel = document.getElementById("conv-assignees");
  sel.innerHTML = "";
  Object.values(membersMap).forEach(function(m) {
    if (m.role === "admin" || m.role === "manager") {
      var opt       = document.createElement("option");
      opt.value     = m.lineId;
      opt.textContent = (m.role === "admin" ? "👑" : "🏷️") + " " + m.name + (m.dept ? "（" + m.dept + "）" : "");
      sel.appendChild(opt);
    }
  });

  document.getElementById("convertOverlay").style.display = "block";
}

async function convertToTask() {
  var name    = document.getElementById("conv-name").value.trim() || reqData.subject;
  var dueDate = document.getElementById("conv-due").value;
  var reqdat  = document.getElementById("conv-reqdata").value.trim();

  var sel = document.getElementById("conv-assignees");
  var selIds = [], selNames = [];
  for (var i = 0; i < sel.options.length; i++) {
    if (sel.options[i].selected) {
      selIds.push(sel.options[i].value);
      selNames.push(membersMap[sel.options[i].value] ? membersMap[sel.options[i].value].name : sel.options[i].value);
    }
  }

  if (selIds.length === 0 || !dueDate) {
    alert("請選擇至少一位負責人並填寫截止日期");
    return;
  }

  var btn = document.getElementById("btnConvert");
  btn.disabled    = true;
  btn.textContent = "建立中…";

  const p = new URLSearchParams({
    action:        "createTask",
    taskId:        "T-" + Date.now(),
    projectName:   name,
    description:   reqData.content || "",
    dept:          "",
    managerName:   selNames.join(","),
    managerLineId: selIds.join(","),
    requesterLineId: myId,
    dueDate:       dueDate,
    requiredData:  reqdat || "",
  });

  try {
    const res  = await fetch(GAS + "?" + p.toString());
    const data = await res.json();
    if (data.status === "ok") {
      document.getElementById("convertOverlay").style.display = "none";
      showSuccess("✅", "請示已批准，任務已建立！", "已通知 " + selNames.join("、") + " 等 " + selIds.length + " 位負責人。");
    } else {
      throw new Error(data.error || "建立失敗");
    }
  } catch (e) {
    alert("建立失敗：" + e.message);
    btn.disabled    = false;
    btn.textContent = "✅ 轉成任務並通知";
  }
}

function skipConvert() {
  document.getElementById("convertOverlay").style.display = "none";
  showSuccess("✅", "已批准", "起單人已收到批准通知。");
}

function showSuccess(icon, title, desc) {
  document.getElementById("app").style.display           = "none";
  document.getElementById("successScreen").style.display = "block";
  document.getElementById("succIcon").textContent  = icon;
  document.getElementById("succTitle").textContent = title;
  document.getElementById("succDesc").textContent  = desc;
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}
function escWithLinks(s) {
  const e = String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
  return e.replace(/(https?:\/\/[^\s<&"]+)/g,
    '<a href="$1" target="_blank" style="color:#4A235A;word-break:break-all;text-decoration:underline;">$1</a>');
}

init();
</script>
